# DeskPilot portable configuration.
# Copy this file as deskpilot.toml beside DeskPilot.exe, or let DeskPilot create it.
schema_version = 1
enabled = true

[wheel]
# "normal": wheel up = previous, wheel down = next.
# "inverted": reverse both directions.
direction = "normal"
# "wrap": cycle from the last desktop to the first and from the first to the last.
# "clamp" remains available when stopping at the edges is preferred.
navigation = "wrap"
# High-resolution wheel deltas are accumulated until this threshold is reached.
threshold = 120
# Prevents one physical gesture from producing several accidental switches.
cooldown_ms = 180

[desktops]
dynamic = true
# Events are coalesced before inspecting desktops and windows.
reconcile_delay_ms = 750
# A non-current internal desktop must remain empty for this long before removal.
# The active desktop is never removed automatically.
empty_grace_ms = 1500
# Low-frequency safety pass for events Windows may not deliver.
watchdog_interval_ms = 3000

[windows]
suspend_in_exclusive_fullscreen = true
# Case-insensitive executable basenames, for example: ["game.exe"]
ignore_executables = []
# Case-insensitive Win32 window classes.
ignore_classes = []

[logging]
level = "info"
max_files = 5
max_file_size_mb = 2
