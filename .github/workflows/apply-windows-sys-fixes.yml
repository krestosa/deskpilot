name: Apply Windows bindings fixes

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - '.github/workflows/apply-windows-sys-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-windows-bindings-fixes
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Apply deterministic windows-sys 0.52 alignment
        shell: pwsh
        run: |
          $encoded = ''
          $script = Join-Path $env:RUNNER_TEMP 'apply-windows-sys-fixes.py'
          python -c "import base64,gzip,pathlib,sys; pathlib.Path(sys.argv[1]).write_bytes(gzip.decompress(base64.b64decode(sys.argv[2])))" $script $encoded
          python $script
          cargo fmt --all
          git add Cargo.toml Cargo.lock src
          git diff --cached --check

      - name: Clippy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 | Tee-Object artifacts\clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Tests
        shell: pwsh
        run: |
          cargo test --workspace --locked 2>&1 | Tee-Object artifacts\tests.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Release build
        shell: pwsh
        run: |
          cargo build --release --locked --target x86_64-pc-windows-msvc 2>&1 | Tee-Object artifacts\build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish validated binding fixes
        shell: pwsh
        run: |
          if (git diff --cached --quiet) { throw 'No source changes were produced.' }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Align Win32 modules with windows-sys 0.52'
          git push origin HEAD:feature/portable-dynamic-desktop-manager

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-bindings-fixes-${{ github.sha }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 3
