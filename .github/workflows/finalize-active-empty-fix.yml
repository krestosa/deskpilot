name: Finalize active empty desktop fix

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - '.github/workflows/finalize-active-empty-fix.yml'
  push:
    branches:
      - fix/preserve-active-empty-and-wrap
    paths:
      - '.github/workflows/finalize-active-empty-fix.yml'

permissions:
  contents: write

concurrency:
  group: deskpilot-finalize-active-empty-fix
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/preserve-active-empty-and-wrap
          fetch-depth: 0

      - name: Install declared Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustc --version --verbose
          cargo --version

      - name: Apply UX, safety, configuration and release updates
        shell: pwsh
        run: |
          function Replace-Exact {
            param([string]$Path, [string]$Old, [string]$New)
            $absolute = (Resolve-Path -LiteralPath $Path).Path
            $text = [IO.File]::ReadAllText($absolute).Replace("`r`n", "`n")
            $oldNormalized = $Old.Replace("`r`n", "`n")
            $newNormalized = $New.Replace("`r`n", "`n")
            if (-not $text.Contains($oldNormalized)) {
              throw "Expected text was not found in $Path"
            }
            $updated = $text.Replace($oldNormalized, $newNormalized)
            [IO.File]::WriteAllText($absolute, $updated, [Text.UTF8Encoding]::new($false))
          }

          Replace-Exact 'src\app.rs' @'
                let result = match &mutation {
                    Mutation::CreateTrailing => self.backend.create().map(|_| ()),
                    Mutation::Switch { desktop } => self.backend.switch_to_id(desktop),
                    Mutation::Remove { desktop, fallback } => {
                        self.backend.remove(desktop, fallback)
                    }
                };
'@ @'
                let result = match &mutation {
                    Mutation::CreateTrailing => self.backend.create().map(|_| ()),
                    Mutation::Remove { desktop, fallback } => {
                        if !inventory::desktop_is_safe_to_remove(&self.backend, desktop) {
                            log(
                                LogLevel::Debug,
                                format!(
                                    "desktop removal deferred because windows remain associated: {}",
                                    desktop.0
                                ),
                            );
                            self.last_reconciliation = Some(timestamp_utc());
                            return;
                        }
                        self.backend.remove(desktop, fallback)
                    }
                };
'@

          Replace-Exact 'src\config.rs' @'
#[derive(Debug, Clone, Copy, Default, Serialize, Deserialize, PartialEq, Eq)]
#[serde(rename_all = "lowercase")]
pub enum NavigationMode {
    #[default]
    Clamp,
    Wrap,
}
'@ @'
#[derive(Debug, Clone, Copy, Default, Serialize, Deserialize, PartialEq, Eq)]
#[serde(rename_all = "lowercase")]
pub enum NavigationMode {
    Clamp,
    #[default]
    Wrap,
}
'@
          Replace-Exact 'src\config.rs' '            navigation: NavigationMode::Clamp,' '            navigation: NavigationMode::Wrap,'

          Replace-Exact 'deskpilot.example.toml' @'
# "clamp": stop at the first/last desktop. "wrap": cycle around.
navigation = "clamp"
'@ @'
# "wrap": cycle from the last desktop to the first and from the first to the last.
# "clamp" remains available when stopping at the edges is preferred.
navigation = "wrap"
'@

          Replace-Exact 'tests\config.rs' 'use deskpilot::config::{Config, ConfigError, CONFIG_SCHEMA_VERSION};' 'use deskpilot::config::{Config, ConfigError, NavigationMode, CONFIG_SCHEMA_VERSION};'
          Replace-Exact 'tests\config.rs' @'
    assert_eq!(config.schema_version, CONFIG_SCHEMA_VERSION);
    config.validate().expect("defaults must validate");
'@ @'
    assert_eq!(config.schema_version, CONFIG_SCHEMA_VERSION);
    assert_eq!(config.wheel.navigation, NavigationMode::Wrap);
    config.validate().expect("defaults must validate");
'@

          Replace-Exact 'src\windows\inventory.rs' "use std::ffi::c_void;`n" ''
          Replace-Exact 'src\windows\inventory.rs' "use windows_sys::Win32::Graphics::Dwm::{DwmGetWindowAttribute, DWMWA_CLOAKED};`n" ''
          Replace-Exact 'src\windows\inventory.rs' @'
        let mut cloaked = 0_u32;
        if DwmGetWindowAttribute(
            hwnd,
            DWMWA_CLOAKED as u32,
            (&mut cloaked as *mut u32).cast::<c_void>(),
            size_of::<u32>() as u32,
        ) >= 0
            && cloaked != 0
        {
            return None;
        }
'@ ''

          Replace-Exact 'Cargo.toml' 'version = "0.1.1"' 'version = "0.1.2"'
          Replace-Exact '.github\workflows\ci.yml' "if (`$version.Stdout -ne 'DeskPilot 0.1.1')" "if (`$version.Stdout -ne 'DeskPilot 0.1.2')"
          Replace-Exact 'README.md' 'navigation = "clamp"' 'navigation = "wrap"'
          Replace-Exact 'docs\architecture.md' @'
known internal empty desktops == 0
known user windows moved or closed == 0
'@ @'
known internal empty desktops == 0, except an empty desktop currently held by the user
known user windows moved or closed == 0
'@
          Replace-Exact 'docs\architecture.md' @'
- `CreateTrailing`
- `Switch { desktop }`
- `Remove { desktop, fallback }`

There is deliberately no move-window or close-window operation. A current empty desktop is switched away from before removal. Every mutation is followed by a fresh backend snapshot. The executor has a fixed iteration limit and detects no-progress cycles.
'@ @'
- `CreateTrailing`
- `Remove { desktop, fallback }`

There is deliberately no move-window, close-window or automatic switch operation. The active desktop is never removed by reconciliation. Before every removal DeskPilot performs a second conservative inventory that includes invisible, cloaked and auxiliary windows; any associated or uncertain window blocks the removal. Non-current internal empties fall back to the trailing spare rather than an occupied previous desktop. Every mutation is followed by a fresh backend snapshot. The executor has a fixed iteration limit and detects no-progress cycles.
'@

          $changelog = [IO.File]::ReadAllText((Resolve-Path 'CHANGELOG.md')).Replace("`r`n", "`n")
          $release = @'
## 0.1.2

- Preserved the active empty desktop instead of automatically switching the user to an occupied desktop.
- Added a conservative pre-removal window inventory so reconciliation cannot move residual application windows to another desktop.
- Changed internal-empty fallback to the trailing spare instead of the previous occupied desktop.
- Made circular wrap navigation the default for Win+wheel.

'@
          if (-not $changelog.Contains('## 0.1.2')) {
            $changelog = $changelog.Replace("# Changelog`n`n", "# Changelog`n`n$release")
            [IO.File]::WriteAllText((Resolve-Path 'CHANGELOG.md'), $changelog, [Text.UTF8Encoding]::new($false))
          }

          cargo generate-lockfile
          cargo fmt --all

      - name: Validate complete fix with Rust 1.85
        shell: pwsh
        run: |
          cargo metadata --locked --no-deps --format-version 1 | Out-Null
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish validated fix
        shell: pwsh
        run: |
          Remove-Item .github\workflows\finalize-active-empty-fix.yml -Force
          git add .
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Finalize active desktop safety and circular navigation'
          git push origin HEAD:fix/preserve-active-empty-and-wrap
