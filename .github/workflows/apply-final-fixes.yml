name: Apply final DeskPilot fixes

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - '.github/final-fixes.b64'
      - '.github/workflows/apply-final-fixes.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
    paths:
      - '.github/workflows/apply-final-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-apply-final-fixes
  cancel-in-progress: false

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
      - name: Install stable formatter
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt
      - name: Verify and apply final source fixes
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'deskpilot-final-fixes.tar.gz'
          [IO.File]::WriteAllBytes(
            $archive,
            [Convert]::FromBase64String((Get-Content -Raw .github\final-fixes.b64).Trim())
          )
          $actual = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          $expected = 'a27e1fa8e30ecff353f12f9aa41273acd9913782597a4c2a0d6540b09b23cf03'
          if ($actual -ne $expected) { throw "Fix archive checksum mismatch: $actual" }
          tar -xzf $archive
          cargo fmt --all
          git add src docs
          git diff --cached --check
      - name: Publish formatted final source
        shell: pwsh
        run: |
          if (git diff --cached --quiet) { throw 'Final source archive produced no changes.' }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Harden window events and Explorer recovery'
          git push origin HEAD:feature/portable-dynamic-desktop-manager
