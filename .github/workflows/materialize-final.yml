name: Materialize verified DeskPilot source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deskpilot-materialize-final
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch with full history
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Recover and verify exact source archive
        shell: bash
        run: |
          set -euo pipefail
          transport_commit='527b94e6dd814cfcd4de831ae94605015e00f394'
          : > /tmp/deskpilot-source.b64
          for index in 00 01 02 03 04 05 06 07; do
            git show "${transport_commit}:.deskpilot-bootstrap/part-${index}" >> /tmp/deskpilot-source.b64
          done
          base64 --decode /tmp/deskpilot-source.b64 > /tmp/deskpilot-source.tar.gz
          echo 'c3798e433b255ce39234a02b229c5bda904ae2fb765f0a316d51c90907a1d214  /tmp/deskpilot-source.tar.gz' | sha256sum --check --strict
          rm -rf /tmp/deskpilot-source
          mkdir -p /tmp/deskpilot-source
          tar --extract --gzip --file /tmp/deskpilot-source.tar.gz --directory /tmp/deskpilot-source
          test -s /tmp/deskpilot-source/Cargo.toml
          test -s /tmp/deskpilot-source/src/main.rs
          test -s /tmp/deskpilot-source/src/app.rs
          test -s /tmp/deskpilot-source/src/tray.rs
          test -s /tmp/deskpilot-source/LICENSE.md
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a /tmp/deskpilot-source/. .
          rm -rf .deskpilot-bootstrap
          rm -f .github/workflows/materialize-final.yml .github/workflows/bootstrap.yml .github/workflows/materialize-source.yml
          test ! -e .deskpilot-bootstrap

      - name: Commit clean verified source tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'Implement portable dynamic desktop manager'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
