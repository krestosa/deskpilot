name: Validate and merge DeskPilot

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: deskpilot-validated-finalizer
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  TARGET: x86_64-pc-windows-msvc

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Recover byte-verified source if transport remains
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Cargo.toml ] && [ ! -d .deskpilot-bootstrap ]; then exit 0; fi
          cp .github/workflows/finalize-validated.yml /tmp/finalize-validated.yml
          transport='527b94e6dd814cfcd4de831ae94605015e00f394'
          : > /tmp/source.b64
          for part in 00 01 02 03 04 05 06 07; do
            git show "${transport}:.deskpilot-bootstrap/part-${part}" >> /tmp/source.b64
          done
          base64 --decode /tmp/source.b64 > /tmp/source.tar.gz
          echo 'c3798e433b255ce39234a02b229c5bda904ae2fb765f0a316d51c90907a1d214  /tmp/source.tar.gz' | sha256sum --check --strict
          rm -rf /tmp/source && mkdir -p /tmp/source
          tar -xzf /tmp/source.tar.gz -C /tmp/source
          test -s /tmp/source/Cargo.toml
          test -s /tmp/source/src/main.rs
          test -s /tmp/source/src/app.rs
          test -s /tmp/source/src/tray.rs
          test -s /tmp/source/LICENSE.md
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a /tmp/source/. .
          mkdir -p .github/workflows
          cp /tmp/finalize-validated.yml .github/workflows/finalize-validated.yml
          rm -rf .deskpilot-bootstrap

      - name: Install stable Rust MSVC
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add $env:TARGET
          rustup component add rustfmt clippy
          rustc --version --verbose
          cargo --version

      - name: Prepare reproducible strict source snapshot
        shell: pwsh
        run: |
          cargo generate-lockfile
          cargo fmt --all
          .\scripts\verify-license.ps1
          $path = '.github\workflows\ci.yml'
          $text = Get-Content -Raw -LiteralPath $path
          $old = @'
      - name: Bootstrap lockfile when absent
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) {
            cargo generate-lockfile
          }
          if (-not (Test-Path Cargo.lock)) { throw 'Cargo.lock was not generated.' }

      - name: Bootstrap formatting snapshot
        shell: pwsh
        run: |
          cargo fmt --all
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path src,tests,Cargo.toml,build.rs -DestinationPath artifacts\formatted-source.zip -Force

'@
          $new = @'
      - name: Require committed lockfile
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) { throw 'Cargo.lock must be committed.' }

      - name: Formatting
        run: cargo fmt --all -- --check

'@
          if ($text.Contains($old)) {
            $text = $text.Replace($old, $new)
            [System.IO.File]::WriteAllText((Resolve-Path $path), $text, [System.Text.UTF8Encoding]::new($false))
          }
          Get-ChildItem .github\workflows -File | Where-Object {
            $_.Name -in @('bootstrap.yml','materialize-source.yml','materialize-final.yml','materialize-retry.yml','prepare-ci.yml','finalize-deskpilot.yml')
          } | Remove-Item -Force

      - name: Commit preparation or define stable snapshot
        id: prepared
        shell: pwsh
        run: |
          git add --all
          git diff --cached --check
          if (-not (git diff --cached --quiet)) {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Materialize verified source and lock dependencies'
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
            "rerun=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "rerun=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Remove finalizer and publish final feature SHA
        if: steps.prepared.outputs.rerun == 'false'
        id: final
        shell: pwsh
        run: |
          Remove-Item .github\workflows\finalize-validated.yml -Force -ErrorAction SilentlyContinue
          git add --all
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Remove temporary publication orchestration'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          $sha = (git rev-parse HEAD).Trim()
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Strict format gate
        if: steps.prepared.outputs.rerun == 'false'
        run: cargo fmt --all -- --check

      - name: Strict Clippy gate
        if: steps.prepared.outputs.rerun == 'false'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test gate
        if: steps.prepared.outputs.rerun == 'false'
        run: cargo test --workspace --locked

      - name: Release build gate
        if: steps.prepared.outputs.rerun == 'false'
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: Runtime command gate
        if: steps.prepared.outputs.rerun == 'false'
        shell: pwsh
        run: |
          $exe = '.\target\x86_64-pc-windows-msvc\release\DeskPilot.exe'
          $version = & $exe --version
          if ($LASTEXITCODE -ne 0 -or $version -notmatch '^DeskPilot 0\.1\.0$') { throw "Unexpected version output: $version" }
          & $exe config validate .\deskpilot.example.toml
          if ($LASTEXITCODE -ne 0) { throw 'Example configuration failed validation.' }
          $mock = & $exe self-test --backend mock --json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $mock.passed) { throw 'Mock self-test failed.' }
          .\scripts\verify-license.ps1

      - name: Portable package gate
        if: steps.prepared.outputs.rerun == 'false'
        shell: pwsh
        run: |
          .\scripts\build-portable.ps1 -SkipBuild
          foreach ($name in @('DeskPilot.exe','deskpilot.example.toml','LICENSE.md','README.md','THIRD_PARTY_NOTICES.md','checksums.sha256')) {
            if (-not (Test-Path -LiteralPath (Join-Path 'dist\DeskPilot' $name) -PathType Leaf)) { throw "Missing package file: $name" }
          }
          if (Get-ChildItem -Recurse -File dist\DeskPilot | Where-Object Extension -in @('.pdb','.tmp')) { throw 'Forbidden package file found.' }

      - name: Hosted safe-mode resource sample
        if: steps.prepared.outputs.rerun == 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          .\scripts\measure-resources.ps1 -SampleSeconds 15 -SafeMode | Set-Content -Encoding utf8NoBOM artifacts\resources-hosted-safe-mode.json
          [ordered]@{
            validated_sha = '${{ steps.final.outputs.sha }}'
            timestamp_utc = [DateTime]::UtcNow.ToString('o')
            interactive_smoke = 'not executed on hosted runner'
          } | ConvertTo-Json | Set-Content -Encoding utf8NoBOM artifacts\validation-metadata.json

      - name: Upload exact-SHA artifact
        if: steps.prepared.outputs.rerun == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: DeskPilot-portable-${{ steps.final.outputs.sha }}
          path: |
            dist/*.zip
            dist/package-report.json
            artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Wait for hosted CI on final SHA
        if: steps.prepared.outputs.rerun == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.final.outputs.sha }}
        run: |
          $deadline = [DateTime]::UtcNow.AddMinutes(25)
          do {
            Start-Sleep -Seconds 15
            $payload = gh api "repos/$env:GITHUB_REPOSITORY/commits/$env:FINAL_SHA/check-runs" | ConvertFrom-Json
            $checks = @($payload.check_runs | Where-Object name -eq 'Windows build and package')
            if ($checks.Count -gt 0 -and @($checks | Where-Object status -ne 'completed').Count -eq 0) {
              if (@($checks | Where-Object conclusion -ne 'success').Count -gt 0) { throw "Hosted CI failed for $env:FINAL_SHA." }
              exit 0
            }
          } while ([DateTime]::UtcNow -lt $deadline)
          throw "Hosted CI did not finish for $env:FINAL_SHA."

      - name: Ready and merge validated PR
        if: steps.prepared.outputs.rerun == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr ready ${{ github.event.pull_request.number }} --repo $env:GITHUB_REPOSITORY
          gh pr merge ${{ github.event.pull_request.number }} --repo $env:GITHUB_REPOSITORY --merge --delete-branch

      - name: Upload failure diagnostics
        if: failure() && steps.prepared.outputs.rerun == 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\failure | Out-Null
          git status --short | Set-Content -Encoding utf8NoBOM artifacts\failure\git-status.txt
          cargo check --workspace --all-targets --locked *>&1 | Set-Content -Encoding utf8NoBOM artifacts\failure\cargo-check.log
          if (Test-Path Cargo.lock) { Copy-Item Cargo.lock artifacts\failure\Cargo.lock }

      - name: Publish failure evidence
        if: failure() && steps.prepared.outputs.rerun == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: DeskPilot-validation-failure-${{ github.event.pull_request.head.sha }}
          path: artifacts/failure/**
          if-no-files-found: warn
          retention-days: 14
