name: Finalize DeskPilot 0.1.3

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - '.github/workflows/finalize-0.1.3.yml'

permissions:
  contents: read

concurrency:
  group: deskpilot-finalize-0-1-3
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/reliable-start-suppression-and-empty-compaction
          fetch-depth: 0

      - name: Install declared Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0
          rustc --version --verbose
          cargo --version

      - name: Materialize version and lockfile
        shell: pwsh
        run: |
          $cargo = Get-Content Cargo.toml -Raw
          $cargo = $cargo.Replace('version = "0.1.2"', 'version = "0.1.3"')
          Set-Content Cargo.toml -Value $cargo -Encoding utf8NoBOM -NoNewline

          $ci = Get-Content .github\workflows\ci.yml -Raw
          $ci = $ci.Replace('DeskPilot 0.1.2', 'DeskPilot 0.1.3')
          Set-Content .github\workflows\ci.yml -Value $ci -Encoding utf8NoBOM -NoNewline

          cargo check --workspace --all-targets
          cargo fmt --all

      - name: Validate finalized tree
        shell: pwsh
        run: |
          cargo metadata --locked --no-deps --format-version 1 | Out-Null
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

          $exe = (Resolve-Path '.\target\x86_64-pc-windows-msvc\release\DeskPilot.exe').Path
          $start = [System.Diagnostics.ProcessStartInfo]::new()
          $start.FileName = $exe
          $start.UseShellExecute = $false
          $start.CreateNoWindow = $true
          $start.RedirectStandardOutput = $true
          $start.RedirectStandardError = $true
          $start.ArgumentList.Add('--version')
          $process = [System.Diagnostics.Process]::new()
          $process.StartInfo = $start
          $null = $process.Start()
          $stdout = $process.StandardOutput.ReadToEnd().Trim()
          $stderr = $process.StandardError.ReadToEnd().Trim()
          $process.WaitForExit()
          if ($process.ExitCode -ne 0 -or $stdout -ne 'DeskPilot 0.1.3') {
            throw "Unexpected version result: exit=$($process.ExitCode) stdout=[$stdout] stderr=[$stderr]"
          }

      - name: Stage validated source artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force finalized-source\.github\workflows | Out-Null
          Copy-Item Cargo.toml finalized-source\Cargo.toml
          Copy-Item Cargo.lock finalized-source\Cargo.lock
          Copy-Item .github\workflows\ci.yml finalized-source\.github\workflows\ci.yml
          Copy-Item dist\DeskPilot-portable-0.1.3.zip finalized-source\DeskPilot-portable-0.1.3.zip

      - name: Upload validated source and portable package
        uses: actions/upload-artifact@v4
        with:
          name: DeskPilot-0.1.3-finalized-source
          path: finalized-source/**
          if-no-files-found: error
          retention-days: 14
