# File purpose: Temporarily reruns the final reconciliation materializer while preserving the documented changelog header.
name: Run final reconciliation fix v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/final-reconciliation-fence'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/final-reconciliation-fence
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Extract and run corrected materializer
        shell: pwsh
        run: |
          $workflow = Get-Content '.github/workflows/apply-final-reconciliation-fix.yml' -Raw
          $match = [regex]::Match($workflow, "(?s)          @'\r?\n(?<script>.*?)\r?\n          '@ \| Set-Content -Encoding utf8NoBOM apply_fix.py")
          if (-not $match.Success) { throw 'Unable to extract canonical materializer.' }
          $script = [regex]::Replace($match.Groups['script'].Value, '(?m)^          ', '')
          $script = $script.Replace(
            'if not changelog.startswith(marker):' + "`n" + '    raise SystemExit("CHANGELOG.md header changed")' + "`n" + 'write("CHANGELOG.md", section + changelog[len(marker):])',
            'if marker not in changelog:' + "`n" + '    raise SystemExit("CHANGELOG.md header changed")' + "`n" + 'write("CHANGELOG.md", changelog.replace(marker, section, 1))'
          )
          $script | Set-Content -Encoding utf8NoBOM apply_fix.py
          python apply_fix.py
          Remove-Item apply_fix.py

      - name: Validate exact patched tree
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish validated changes
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if (git diff --cached --quiet) { exit 0 }
          git commit -m "Serialize reconciliation and capture Win scroll"
          git push origin HEAD:fix/final-reconciliation-fence
