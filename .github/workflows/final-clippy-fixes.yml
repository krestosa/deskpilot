name: Apply final Clippy fixes

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - '.github/workflows/final-clippy-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-final-clippy-fixes
  cancel-in-progress: false

jobs:
  apply:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy
      - name: Apply deterministic Clippy fixes
        shell: pwsh
        run: |
          $encoded = ''
          $script = Join-Path $env:RUNNER_TEMP 'fix-clippy.py'
          python -c "import base64,pathlib,sys; pathlib.Path(sys.argv[1]).write_bytes(base64.b64decode(sys.argv[2]))" $script $encoded
          python $script
          cargo fmt --all
          git add src
          git diff --cached --check
      - name: Validate source
        shell: pwsh
        run: |
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
      - name: Publish validated fixes
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Resolve strict Clippy diagnostics'
          git push origin HEAD:feature/portable-dynamic-desktop-manager
# deterministic retry after removal of competing rewrite workflow
