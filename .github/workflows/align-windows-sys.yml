name: Align Windows bindings

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
    paths:
      - '.github/workflows/align-windows-sys.yml'
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - '.github/workflows/align-windows-sys.yml'

permissions:
  contents: write

concurrency:
  group: deskpilot-align-windows-sys
  cancel-in-progress: false

jobs:
  align:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt
      - name: Align direct windows-sys dependency and lockfile
        shell: pwsh
        run: |
          $path = 'Cargo.toml'
          $text = Get-Content -Raw -LiteralPath $path
          $updated = $text.Replace('windows-sys = { version = "0.59", features = [', 'windows-sys = { version = "0.52", features = [')
          if ($updated -eq $text) { throw 'Expected windows-sys 0.59 dependency declaration was not found.' }
          [IO.File]::WriteAllText((Resolve-Path $path), $updated, [Text.UTF8Encoding]::new($false))
          cargo update -p windows-sys@0.59.0 --precise 0.52.0
          cargo fmt --all
          Remove-Item .github\workflows\align-windows-sys.yml -Force
          git add Cargo.toml Cargo.lock src tests .github\workflows\align-windows-sys.yml
          git diff --cached --check
      - name: Publish aligned bindings
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Align Win32 bindings with windows-sys 0.52'
          git push origin HEAD:feature/portable-dynamic-desktop-manager
