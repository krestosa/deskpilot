name: Format PR 7

on:
  push:
    branches:
      - fix/direct-win-release-and-window-mapping
    paths:
      - '.github/workflows/format-pr7.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/direct-win-release-and-window-mapping
          fetch-depth: 0
      - shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt
          rustup default 1.85.0
          cargo fmt --all
          Remove-Item .github\workflows\format-pr7.yml -Force
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Format direct input and occupancy fixes'
          git push origin HEAD:fix/direct-win-release-and-window-mapping
