# File purpose: Temporarily applies, diagnoses, and validates persistent visible-window confirmation for the trailing spare.
name: Harden spare confirmation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/event-confirmed-spare-occupancy'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/event-confirmed-spare-occupancy
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Apply persistent confirmation hardening
        shell: pwsh
        run: |
          if (Select-String -Path src\reconciliation\spare_guard.rs -SimpleMatch 'REQUIRED_CONFIRMATIONS' -Quiet) {
            Write-Host 'Persistent confirmation hardening already applied.'
          } else {
            python tools/fix_hardening_materializer.py
            python tools/harden_spare_confirmation.py
          }

      - name: Format generated Rust
        shell: pwsh
        run: cargo fmt --all

      - name: Check formatting
        shell: pwsh
        run: cargo fmt --all -- --check

      - name: Run Clippy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 |
            Tee-Object -FilePath diagnostics\clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Capture failed generated source
        if: failure()
        shell: pwsh
        run: |
          Copy-Item src\reconciliation\spare_guard.rs diagnostics\spare_guard.rs
          Copy-Item src\windows\inventory.rs diagnostics\inventory.rs
          Copy-Item src\app.rs diagnostics\app.rs
          Copy-Item tests\spare_guard.rs diagnostics\spare_guard_tests.rs

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spare-confirmation-diagnostics-${{ github.event.pull_request.head.sha }}
          path: diagnostics/**
          if-no-files-found: error

      - name: Run tests
        shell: pwsh
        run: cargo test --workspace --locked

      - name: Build release
        shell: pwsh
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Verify license and package
        shell: pwsh
        run: |
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish validated source changes
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src tests
          if (git diff --cached --quiet) {
            Write-Host 'No source changes to publish.'
            exit 0
          }
          git commit -m "Require persistent visible spare occupancy"
          git push origin HEAD:fix/event-confirmed-spare-occupancy
