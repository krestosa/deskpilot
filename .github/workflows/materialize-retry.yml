name: Retry verified DeskPilot materialization

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Materialize source
        shell: bash
        run: |
          set -euo pipefail
          commit='527b94e6dd814cfcd4de831ae94605015e00f394'
          : > /tmp/source.b64
          for index in 00 01 02 03 04 05 06 07; do git show "${commit}:.deskpilot-bootstrap/part-${index}" >> /tmp/source.b64; done
          base64 --decode /tmp/source.b64 > /tmp/source.tar.gz
          echo 'c3798e433b255ce39234a02b229c5bda904ae2fb765f0a316d51c90907a1d214  /tmp/source.tar.gz' | sha256sum --check --strict
          rm -rf /tmp/source && mkdir /tmp/source
          tar -xzf /tmp/source.tar.gz -C /tmp/source
          test -s /tmp/source/Cargo.toml
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a /tmp/source/. .
          rm -rf .deskpilot-bootstrap
          rm -f .github/workflows/materialize-final.yml .github/workflows/materialize-retry.yml .github/workflows/bootstrap.yml .github/workflows/materialize-source.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'Implement portable dynamic desktop manager'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
