name: Finalize shell hook fix

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - '.github/workflows/finalize-shell-hook-fix.yml'

permissions:
  contents: write

concurrency:
  group: deskpilot-finalize-shell-hook-fix
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/shell-hook-and-reconciliation
          fetch-depth: 0

      - name: Install declared Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0
          rustc --version --verbose
          cargo --version

      - name: Materialize lockfile and format
        shell: pwsh
        run: |
          cargo check --workspace --all-targets
          cargo fmt --all

      - name: Validate finalized tree
        shell: pwsh
        run: |
          cargo metadata --locked --no-deps --format-version 1 | Out-Null
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild
          $version = & .\target\x86_64-pc-windows-msvc\release\DeskPilot.exe --version
          if (($version | Out-String).Trim() -ne 'DeskPilot 0.1.2') { throw "Unexpected version: $version" }

      - name: Publish finalized source
        shell: pwsh
        run: |
          Remove-Item .github\workflows\finalize-shell-hook-fix.yml -Force
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Finalize DeskPilot 0.1.2 lockfile and formatting'
          git push origin HEAD:fix/shell-hook-and-reconciliation
