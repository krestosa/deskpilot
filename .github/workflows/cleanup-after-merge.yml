name: Cleanup DeskPilot feature branch after merge

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
      - name: Delete branch only after verified merge
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          merged="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/1" --jq '.merged')"
          if [ "$merged" = 'true' ]; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/feature/portable-dynamic-desktop-manager"
            exit 0
          fi
          rm -f .github/workflows/cleanup-after-merge.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'Remove deferred branch cleanup'
          git push origin HEAD:feature/portable-dynamic-desktop-manager
