# File purpose: Assembles the final audited source, validates it, and commits only a passing formatted tree.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deskpilot-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  TARGET: x86_64-pc-windows-msvc

jobs:
  validate:
    name: Assemble and validate audit remediation
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true

      - name: Assemble readable remediation sources
        id: assemble
        shell: pwsh
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          $parts = @(Get-ChildItem -LiteralPath '.remediation' -Filter 'app-part-*' -File -ErrorAction SilentlyContinue | Sort-Object Name)
          if ($parts.Count -eq 0) {
            'changed=false' >> $env:GITHUB_OUTPUT
            exit 0
          }
          if (-not $env:HEAD_BRANCH) { throw 'Source assembly is allowed only from a pull request branch.' }
          git switch -C $env:HEAD_BRANCH
          $builder = [Text.StringBuilder]::new()
          foreach ($part in $parts) {
            [void]$builder.Append([IO.File]::ReadAllText($part.FullName))
          }
          [IO.File]::WriteAllText('src\app.rs', $builder.ToString(), [Text.UTF8Encoding]::new($false))
          Copy-Item -Force '.remediation\final-ci.yml' '.github\workflows\ci.yml'
          Copy-Item -Force '.remediation\windows-integration.yml' '.github\workflows\windows-integration.yml'
          Remove-Item -Recurse -Force -LiteralPath '.remediation'
          'changed=true' >> $env:GITHUB_OUTPUT

      - name: Install pinned Rust MSVC
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
          rustup target add $env:TARGET
          rustup component add rustfmt clippy
          rustc --version --verbose
          cargo --version

      - name: Normalize formatting
        shell: pwsh
        run: cargo fmt --all

      - name: Verify committed dependency lock
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock -PathType Leaf)) { throw 'Cargo.lock is not committed.' }
          cargo metadata --locked --no-deps --format-version 1 | Out-Null

      - name: Clippy
        shell: pwsh
        run: |
          cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 |
            Tee-Object -FilePath artifacts\clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Unit and integration tests
        shell: pwsh
        run: |
          cargo test --workspace --locked 2>&1 | Tee-Object -FilePath artifacts\tests.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $failures = @()
          Get-ChildItem .\scripts -Filter '*.ps1' -File | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            foreach ($error in $errors) { $failures += "$($_.Name): $($error.Message)" }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }

      - name: Release build
        shell: pwsh
        run: |
          cargo build --release --locked --target $env:TARGET 2>&1 |
            Tee-Object -FilePath artifacts\build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify license and portable package
        shell: pwsh
        run: |
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Commit validated assembled source
        if: steps.assemble.outputs.changed == 'true'
        shell: pwsh
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if (git diff --cached --quiet) { throw 'Assembly produced no changes.' }
          git commit -m 'Complete comprehensive audit remediation'
          git push origin "HEAD:$env:HEAD_BRANCH"

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: DeskPilot-remediation-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: artifacts/*
          if-no-files-found: warn
          retention-days: 3
