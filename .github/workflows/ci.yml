# File purpose: Refreshes the patched dependency lockfile, applies the Rust 1.88 lint correction, validates the complete Windows build, and publishes only passing files.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deskpilot-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'
  TARGET: x86_64-pc-windows-msvc

jobs:
  validate:
    name: Refresh and validate patched dependencies
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout exact source SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: true

      - name: Install pinned Rust MSVC
        shell: pwsh
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
          rustup target add $env:TARGET
          rustup component add rustfmt clippy
          rustc --version --verbose
          cargo --version

      - name: Refresh patched lockfile
        shell: pwsh
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if (-not $env:HEAD_BRANCH) { throw 'Publication is allowed only from a pull request branch.' }
          git switch -C $env:HEAD_BRANCH
          cargo update -p time --precise 0.3.47
          cargo metadata --locked --no-deps --format-version 1 | Out-Null

      - name: Apply Rust 1.88 lint correction
        shell: pwsh
        run: |
          $path = 'src\app.rs'
          $content = [IO.File]::ReadAllText($path)
          $old = 'let message = format!("DeskPilot {}\n{}\n", APP_VERSION, info);'
          $new = 'let message = format!("DeskPilot {APP_VERSION}\n{info}\n");'
          if ($content.Contains($old)) {
            $content = $content.Replace($old, $new)
            [IO.File]::WriteAllText($path, $content, [Text.UTF8Encoding]::new($false))
          } elseif (-not $content.Contains($new)) {
            throw 'Expected panic-report format expression was not found.'
          }
          cargo fmt --all

      - name: Install pinned cargo-audit
        shell: pwsh
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Audit Rust dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          cargo audit --json --file Cargo.lock 2>&1 |
            Tee-Object -FilePath artifacts\audit.json
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Check Rust formatting
        shell: pwsh
        run: |
          cargo fmt --all -- --check 2>&1 | Tee-Object -FilePath artifacts\format.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Clippy
        shell: pwsh
        run: |
          cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 |
            Tee-Object -FilePath artifacts\clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Unit and integration tests
        shell: pwsh
        run: |
          cargo test --workspace --locked 2>&1 |
            Tee-Object -FilePath artifacts\tests.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate PowerShell scripts
        shell: pwsh
        run: |
          $failures = @()
          Get-ChildItem .\scripts -Filter '*.ps1' -File | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            foreach ($error in $errors) { $failures += "$($_.Name): $($error.Message)" }
          }
          if ($failures.Count -gt 0) { throw ($failures -join [Environment]::NewLine) }

      - name: Release build
        shell: pwsh
        run: |
          cargo build --release --locked --target $env:TARGET 2>&1 |
            Tee-Object -FilePath artifacts\build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate redirected CLI output
        shell: pwsh
        run: |
          $exe = (Resolve-Path '.\target\x86_64-pc-windows-msvc\release\DeskPilot.exe').Path
          function Invoke-DeskPilotProcess {
            param([string]$Name, [string[]]$Arguments)
            $start = [System.Diagnostics.ProcessStartInfo]::new()
            $start.FileName = $exe
            $start.UseShellExecute = $false
            $start.CreateNoWindow = $true
            $start.RedirectStandardOutput = $true
            $start.RedirectStandardError = $true
            foreach ($argument in $Arguments) { $start.ArgumentList.Add($argument) }
            $process = [System.Diagnostics.Process]::new()
            $process.StartInfo = $start
            $null = $process.Start()
            $stdout = $process.StandardOutput.ReadToEnd()
            $stderr = $process.StandardError.ReadToEnd()
            $process.WaitForExit()
            [pscustomobject]@{
              ExitCode = $process.ExitCode
              Stdout = $stdout.Trim()
              Stderr = $stderr.Trim()
            }
          }

          $version = Invoke-DeskPilotProcess -Name 'version' -Arguments @('--version')
          if ($version.ExitCode -ne 0 -or $version.Stdout -ne 'DeskPilot 0.1.8') { throw "Invalid version output: [$($version.Stdout)] $($version.Stderr)" }
          $help = Invoke-DeskPilotProcess -Name 'help' -Arguments @('--help')
          if ($help.ExitCode -ne 0 -or -not $help.Stdout.StartsWith('DeskPilot') -or $help.Stdout -match 'DeskPilot 0\.1\.0') { throw 'Invalid help output.' }
          $config = Invoke-DeskPilotProcess -Name 'config-validate' -Arguments @('config', 'validate', '.\deskpilot.example.toml')
          if ($config.ExitCode -ne 0 -or -not $config.Stdout.StartsWith('valid:')) { throw "Config validation failed: $($config.Stderr)" }
          $selfTestResult = Invoke-DeskPilotProcess -Name 'self-test' -Arguments @('self-test', '--backend', 'mock', '--json')
          if ($selfTestResult.ExitCode -ne 0) { throw "Mock self-test failed: $($selfTestResult.Stderr)" }
          $selfTest = $selfTestResult.Stdout | ConvertFrom-Json
          if (-not $selfTest.passed -or $selfTest.backend -ne 'mock' -or $selfTest.cases -lt 6) { throw 'Mock backend self-test returned an invalid result.' }

      - name: Verify exact license and portable package
        shell: pwsh
        run: |
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild 2>&1 |
            Tee-Object -FilePath artifacts\package.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit validated dependency and lint updates
        shell: pwsh
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git add Cargo.lock src/app.rs
          if (git diff --cached --quiet) { exit 0 }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Regenerate lockfile and align Rust 1.88 lint'
          git push origin "HEAD:$env:HEAD_BRANCH"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: DeskPilot-lock-refresh-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            dist/*.zip
            dist/package-report.json
            artifacts/*
          if-no-files-found: warn
          retention-days: 3
