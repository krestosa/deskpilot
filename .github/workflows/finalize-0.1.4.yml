name: Publish DeskPilot 0.1.4 lockfile

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - '.github/workflows/finalize-0.1.4.yml'

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/direct-win-release-and-window-mapping
          fetch-depth: 0

      - name: Publish validated lockfile
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --target x86_64-pc-windows-msvc
          rustup default 1.85.0
          cargo check --workspace --all-targets
          cargo metadata --locked --no-deps --format-version 1 | Out-Null

          Remove-Item .github\workflows\finalize-0.1.4.yml -Force
          git add Cargo.lock .github\workflows\finalize-0.1.4.yml
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Finalize DeskPilot 0.1.4 lockfile'
          git push origin HEAD:fix/direct-win-release-and-window-mapping
