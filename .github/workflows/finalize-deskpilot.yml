name: Finalize DeskPilot implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read

concurrency:
  group: deskpilot-finalize
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-pc-windows-msvc

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout feature branch with history
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Materialize verified source when required
        id: materialize
        shell: bash
        run: |
          set -euo pipefail
          if [ -f Cargo.toml ] && [ ! -d .deskpilot-bootstrap ]; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp .github/workflows/finalize-deskpilot.yml /tmp/finalize-deskpilot.yml
          commit='527b94e6dd814cfcd4de831ae94605015e00f394'
          : > /tmp/source.b64
          for index in 00 01 02 03 04 05 06 07; do
            git show "${commit}:.deskpilot-bootstrap/part-${index}" >> /tmp/source.b64
          done
          base64 --decode /tmp/source.b64 > /tmp/source.tar.gz
          echo 'c3798e433b255ce39234a02b229c5bda904ae2fb765f0a316d51c90907a1d214  /tmp/source.tar.gz' | sha256sum --check --strict
          rm -rf /tmp/source
          mkdir -p /tmp/source
          tar -xzf /tmp/source.tar.gz -C /tmp/source
          test -s /tmp/source/Cargo.toml
          test -s /tmp/source/src/main.rs
          test -s /tmp/source/src/app.rs
          test -s /tmp/source/src/tray.rs
          test -s /tmp/source/LICENSE.md
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a /tmp/source/. .
          mkdir -p .github/workflows
          cp /tmp/finalize-deskpilot.yml .github/workflows/finalize-deskpilot.yml
          rm -rf .deskpilot-bootstrap
          rm -f .github/workflows/materialize-final.yml .github/workflows/materialize-retry.yml .github/workflows/materialize-source.yml .github/workflows/bootstrap.yml .github/workflows/prepare-ci.yml
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Install stable Rust MSVC
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add $env:TARGET
          rustup component add rustfmt clippy
          rustc --version --verbose
          cargo --version

      - name: Lock, format and make hosted CI strict
        shell: pwsh
        run: |
          cargo generate-lockfile
          cargo fmt --all
          .\scripts\verify-license.ps1
          $path = '.github\workflows\ci.yml'
          $text = Get-Content -Raw -LiteralPath $path
          $old = @'
      - name: Bootstrap lockfile when absent
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) {
            cargo generate-lockfile
          }
          if (-not (Test-Path Cargo.lock)) { throw 'Cargo.lock was not generated.' }

      - name: Bootstrap formatting snapshot
        shell: pwsh
        run: |
          cargo fmt --all
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path src,tests,Cargo.toml,build.rs -DestinationPath artifacts\formatted-source.zip -Force

'@
          $new = @'
      - name: Require committed lockfile
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) { throw 'Cargo.lock must be committed.' }

      - name: Formatting
        run: cargo fmt --all -- --check

'@
          if ($text.Contains($old)) {
            $text = $text.Replace($old, $new)
            [System.IO.File]::WriteAllText((Resolve-Path $path), $text, [System.Text.UTF8Encoding]::new($false))
          }
          Remove-Item .github\workflows\materialize-final.yml,.github\workflows\materialize-retry.yml,.github\workflows\materialize-source.yml,.github\workflows\bootstrap.yml,.github\workflows\prepare-ci.yml -Force -ErrorAction SilentlyContinue

      - name: Commit prepared source and rerun on its SHA
        id: prepare
        shell: pwsh
        run: |
          git add --all
          git diff --cached --check
          if (git diff --cached --quiet) {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Materialize verified source and lock dependencies'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Stop after preparation push
        if: steps.prepare.outputs.changed == 'true'
        shell: pwsh
        run: exit 0

      - name: Remove transient finalizer and define final SHA
        if: steps.prepare.outputs.changed != 'true'
        id: final
        shell: pwsh
        run: |
          Remove-Item .github\workflows\finalize-deskpilot.yml -Force
          git add --all
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Remove temporary publication orchestration'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          $sha = (git rev-parse HEAD).Trim()
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Strict formatting
        if: steps.prepare.outputs.changed != 'true'
        run: cargo fmt --all -- --check

      - name: Clippy
        if: steps.prepare.outputs.changed != 'true'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Unit and integration tests
        if: steps.prepare.outputs.changed != 'true'
        run: cargo test --workspace --locked

      - name: Release build
        if: steps.prepare.outputs.changed != 'true'
        run: cargo build --release --locked --target ${{ env.TARGET }}

      - name: Validate packaged commands and license
        if: steps.prepare.outputs.changed != 'true'
        shell: pwsh
        run: |
          $exe = '.\target\x86_64-pc-windows-msvc\release\DeskPilot.exe'
          $version = & $exe --version
          if ($LASTEXITCODE -ne 0 -or $version -notmatch '^DeskPilot 0\.1\.0$') { throw "Unexpected version output: $version" }
          & $exe config validate .\deskpilot.example.toml
          if ($LASTEXITCODE -ne 0) { throw 'Example configuration failed validation.' }
          $selfTest = & $exe self-test --backend mock --json | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $selfTest.passed) { throw 'Mock self-test failed.' }
          .\scripts\verify-license.ps1

      - name: Build and verify portable artifact
        if: steps.prepare.outputs.changed != 'true'
        shell: pwsh
        run: |
          .\scripts\build-portable.ps1 -SkipBuild
          $required = @('DeskPilot.exe','deskpilot.example.toml','LICENSE.md','README.md','THIRD_PARTY_NOTICES.md','checksums.sha256')
          foreach ($name in $required) {
            if (-not (Test-Path -LiteralPath (Join-Path 'dist\DeskPilot' $name) -PathType Leaf)) { throw "Missing package file: $name" }
          }
          if (Get-ChildItem -Recurse -File dist\DeskPilot | Where-Object Extension -in @('.pdb','.tmp')) { throw 'Portable package contains forbidden files.' }

      - name: Measure hosted safe-mode resources
        if: steps.prepare.outputs.changed != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          .\scripts\measure-resources.ps1 -SampleSeconds 15 -SafeMode | Set-Content -Encoding utf8NoBOM artifacts\resources-hosted-safe-mode.json
          [ordered]@{
            validated_sha = '${{ steps.final.outputs.sha }}'
            timestamp_utc = [DateTime]::UtcNow.ToString('o')
            interactive_smoke = 'not executed on hosted runner'
          } | ConvertTo-Json | Set-Content -Encoding utf8NoBOM artifacts\validation-metadata.json

      - name: Upload exact-SHA artifact and evidence
        if: steps.prepare.outputs.changed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: DeskPilot-portable-${{ steps.final.outputs.sha }}
          path: |
            dist/*.zip
            dist/package-report.json
            artifacts/*
          if-no-files-found: error
          retention-days: 30

      - name: Wait for hosted CI on final SHA
        if: steps.prepare.outputs.changed != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.final.outputs.sha }}
        run: |
          $deadline = [DateTime]::UtcNow.AddMinutes(25)
          do {
            Start-Sleep -Seconds 15
            $runs = gh api "repos/$env:GITHUB_REPOSITORY/commits/$env:FINAL_SHA/check-runs" | ConvertFrom-Json
            $gate = @($runs.check_runs | Where-Object name -eq 'Windows build and package')
            if ($gate.Count -gt 0 -and @($gate | Where-Object status -ne 'completed').Count -eq 0) {
              $failures = @($gate | Where-Object conclusion -ne 'success')
              if ($failures.Count -gt 0) { throw "Hosted CI failed for $env:FINAL_SHA: $($failures.conclusion -join ', ')" }
              exit 0
            }
          } while ([DateTime]::UtcNow -lt $deadline)
          throw "Hosted CI did not complete for $env:FINAL_SHA before timeout."

      - name: Mark PR ready and merge validated head
        if: steps.prepare.outputs.changed != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr ready ${{ github.event.pull_request.number }} --repo $env:GITHUB_REPOSITORY
          gh pr merge ${{ github.event.pull_request.number }} --repo $env:GITHUB_REPOSITORY --merge --delete-branch
