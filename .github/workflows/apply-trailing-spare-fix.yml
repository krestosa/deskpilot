name: Apply trailing spare creation fix

on:
  push:
    branches: [fix/create-trailing-after-window-open]
    paths: ['.github/workflows/apply-trailing-spare-fix.yml']
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
    paths: ['.github/workflows/apply-trailing-spare-fix.yml']

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/create-trailing-after-window-open
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Apply fix
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise RuntimeError(f"{path}: expected exactly one match for replacement")
              file.write_text(text.replace(old, new, 1), encoding="utf-8", newline="\n")

          replace("Cargo.toml", 'version = "0.1.4"', 'version = "0.1.5"')

          replace(
              "src/windows/desktops.rs",
              '''    pub fn is_window_pinned(&self, hwnd: HWND) -> Result<bool, String> {\n''',
              '''    pub fn is_window_on_current_desktop(&self, hwnd: HWND) -> Result<bool, String> {\n        self.require_compatible()?;\n        winvd::is_window_on_current_desktop(to_win_hwnd(hwnd)).map_err(format_error)\n    }\n\n    pub fn is_window_pinned(&self, hwnd: HWND) -> Result<bool, String> {\n''',
          )

          replace(
              "src/windows/inventory.rs",
              '''        if let Some(desktop) = locate_window_desktop(backend, &desktops, hwnd) {\n''',
              '''        if let Some(desktop) =\n            locate_window_desktop(backend, &desktops, &current.id, hwnd)\n        {\n''',
          )
          replace(
              "src/windows/inventory.rs",
              '''fn locate_window_desktop(\n    backend: &WinvdBackend,\n    desktops: &[DesktopInfo],\n    hwnd: HWND,\n) -> Option<DesktopId> {\n    if let Ok(desktop) = backend.desktop_for_window(hwnd) {\n''',
              '''fn locate_window_desktop(\n    backend: &WinvdBackend,\n    desktops: &[DesktopInfo],\n    current: &DesktopId,\n    hwnd: HWND,\n) -> Option<DesktopId> {\n    if backend\n        .is_window_on_current_desktop(hwnd)\n        .is_ok_and(|present| present)\n    {\n        return Some(current.clone());\n    }\n\n    if let Ok(desktop) = backend.desktop_for_window(hwnd) {\n''',
          )

          replace(
              "src/app.rs",
              '''            Ok(AppSignal::Navigation(step)) => state.navigate(step),\n''',
              '''            Ok(AppSignal::Navigation(step)) => {\n                state.navigate(step);\n                let delay = state.config_read().desktops.reconcile_delay_ms;\n                schedule_reconcile_at_earliest(\n                    &mut pending_reconcile,\n                    Instant::now() + Duration::from_millis(delay),\n                );\n            }\n''',
          )
          replace(
              "src/app.rs",
              '''            Ok(AppSignal::DesktopEvent | AppSignal::WindowEvent) => {\n                let delay = state.config_read().desktops.reconcile_delay_ms;\n                pending_reconcile = Some(Instant::now() + Duration::from_millis(delay));\n            }\n''',
              '''            Ok(AppSignal::DesktopEvent | AppSignal::WindowEvent) => {\n                let delay = state.config_read().desktops.reconcile_delay_ms;\n                schedule_reconcile_at_earliest(\n                    &mut pending_reconcile,\n                    Instant::now() + Duration::from_millis(delay),\n                );\n            }\n''',
          )
          replace(
              "src/app.rs",
              '''        if now >= next_watchdog {\n            pending_reconcile.get_or_insert(now);\n            next_watchdog =\n                now + Duration::from_millis(config_snapshot.desktops.watchdog_interval_ms);\n        }\n''',
              '''        if now >= next_watchdog {\n            schedule_reconcile_at_earliest(&mut pending_reconcile, now);\n            next_watchdog =\n                now + Duration::from_millis(config_snapshot.desktops.watchdog_interval_ms);\n        }\n''',
          )
          replace(
              "src/app.rs",
              '''struct AppState {\n''',
              '''fn schedule_reconcile_at_earliest(pending: &mut Option<Instant>, deadline: Instant) {\n    match pending {\n        Some(current) if *current <= deadline => {}\n        _ => *pending = Some(deadline),\n    }\n}\n\nstruct AppState {\n''',
          )
          replace(
              "src/app.rs",
              '''struct InstanceGuard {\n''',
              '''#[cfg(test)]\nmod scheduling_tests {\n    use super::schedule_reconcile_at_earliest;\n    use std::time::{Duration, Instant};\n\n    #[test]\n    fn repeated_window_events_cannot_postpone_reconciliation() {\n        let now = Instant::now();\n        let first = now + Duration::from_millis(250);\n        let mut pending = Some(first);\n        schedule_reconcile_at_earliest(&mut pending, now + Duration::from_secs(2));\n        assert_eq!(pending, Some(first));\n    }\n\n    #[test]\n    fn watchdog_advances_a_later_pending_reconciliation() {\n        let now = Instant::now();\n        let mut pending = Some(now + Duration::from_secs(2));\n        schedule_reconcile_at_earliest(&mut pending, now);\n        assert_eq!(pending, Some(now));\n    }\n}\n\nstruct InstanceGuard {\n''',
          )

          replace(
              "tests/reconciliation.rs",
              '''#[test]\nfn occupied_then_empty_is_stable() {\n''',
              '''#[test]\nfn active_occupied_last_desktop_creates_a_new_spare() {\n    let mut snapshot = states(&[Occupancy::Occupied, Occupancy::Occupied]);\n    set_current(&mut snapshot, 1);\n    let result = plan(&snapshot);\n    assert_eq!(result.mutations, vec![Mutation::CreateTrailing]);\n}\n\n#[test]\nfn occupied_then_empty_is_stable() {\n''',
          )

          replace(
              "CHANGELOG.md",
              '''# Changelog\n\n''',
              '''# Changelog\n\n## 0.1.5\n\n- Detect newly opened windows on the active desktop through the official virtual desktop manager path before internal GUID mapping.\n- Prevent repeated window events from postponing reconciliation indefinitely; the earliest deadline wins and the watchdog can force an immediate pass.\n- Reconcile after successful wheel navigation so occupying the trailing spare always creates a new empty desktop.\n\n''',
          )
          '@ | python -

          cargo check --workspace --all-targets
          cargo fmt --all

      - name: Validate fixed tree
        shell: pwsh
        run: |
          cargo metadata --locked --no-deps --format-version 1 | Out-Null
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish clean validated commit
        shell: pwsh
        run: |
          Remove-Item .github\workflows\apply-trailing-spare-fix.yml -Force
          git add Cargo.toml Cargo.lock CHANGELOG.md src\app.rs src\windows\desktops.rs src\windows\inventory.rs tests\reconciliation.rs .github\workflows\apply-trailing-spare-fix.yml
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Create a trailing spare after opening a window'
          git push origin HEAD:fix/create-trailing-after-window-open
