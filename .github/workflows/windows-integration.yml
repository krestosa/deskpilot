# File purpose: Runs the real interactive Windows 11 smoke test and resource measurements on a dedicated self-hosted runner.
name: Windows interactive integration

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deskpilot-interactive-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-pc-windows-msvc

jobs:
  smoke:
    name: Dedicated interactive Windows 11 smoke
    runs-on: [self-hosted, Windows, X64, deskpilot-interactive]
    timeout-minutes: 30

    steps:
      - name: Checkout exact dispatched SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify interactive Windows 11 session
        shell: pwsh
        run: |
          if (-not [Environment]::UserInteractive) { throw 'Runner is not interactive.' }
          $os = Get-CimInstance Win32_OperatingSystem
          if ([int]$os.BuildNumber -lt 26100) { throw "Windows build $($os.BuildNumber) is unsupported." }
          if (-not [Environment]::Is64BitOperatingSystem) { throw 'Runner is not x64.' }
          if (-not (Get-Process explorer -ErrorAction SilentlyContinue)) { throw 'Explorer is not running.' }

      - name: Install pinned Rust MSVC
        shell: pwsh
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0
          rustup target add $env:TARGET

      - name: Verify committed lockfile
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock -PathType Leaf)) { throw 'Cargo.lock is not committed.' }
          cargo metadata --locked --no-deps --format-version 1 | Out-Null

      - name: Build release
        shell: pwsh
        run: cargo build --release --locked --target $env:TARGET

      - name: Run isolated interactive smoke
        shell: pwsh
        run: .\scripts\smoke-windows.ps1

      - name: Measure resources
        shell: pwsh
        run: |
          .\scripts\measure-resources.ps1 -SampleSeconds 15 |
            Set-Content -Encoding utf8NoBOM artifacts\windows-smoke\resources.json

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: DeskPilot-interactive-${{ github.sha }}
          path: artifacts/windows-smoke/**
          if-no-files-found: error
          retention-days: 30
