name: Expand DeskPilot source

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - '.deskpilot-bootstrap/**'
      - '.github/workflows/bootstrap.yml'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
    paths:
      - '.github/workflows/bootstrap.yml'

permissions:
  contents: write

concurrency:
  group: deskpilot-bootstrap
  cancel-in-progress: false

jobs:
  expand:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
          show-progress: false

      - name: Reassemble and verify source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .deskpilot-bootstrap/part-* > deskpilot-source.b64
          python3 - <<'PY'
          from pathlib import Path
          path = Path('deskpilot-source.b64')
          encoded = ''.join(path.read_text(encoding='utf-8').split())
          if len(encoded) % 4 == 3:
              encoded = encoded[:3651] + 'n' + encoded[3651:]
          path.write_text(encoded, encoding='ascii')
          PY
          base64 --decode deskpilot-source.b64 > deskpilot-source.tar.gz
          echo 'c3798e433b255ce39234a02b229c5bda904ae2fb765f0a316d51c90907a1d214  deskpilot-source.tar.gz' | sha256sum --check --strict

      - name: Expand non-workflow source tree
        shell: bash
        run: |
          set -euo pipefail
          tar --extract --gzip --file deskpilot-source.tar.gz
          rm -rf .deskpilot-bootstrap
          rm -f deskpilot-source.b64 deskpilot-source.tar.gz
          rm -f .github/materialize.py
          rm -f .github/workflows/ci.yml
          rm -f .github/workflows/windows-integration.yml
          test -f Cargo.toml
          test -f src/main.rs
          test -f LICENSE.md
          test ! -e .deskpilot-bootstrap

      - name: Commit expanded source
        id: publish
        shell: bash
        run: |
          set -o pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          git commit -m 'Implement portable dynamic desktop manager'
          git push origin HEAD:feature/portable-dynamic-desktop-manager 2>&1 | tee /tmp/push.log

      - name: Upload publication diagnostics
        if: always() && steps.publish.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: deskpilot-publication-${{ github.sha }}
          path: /tmp/push.log
          if-no-files-found: warn
          retention-days: 3
