name: Run repository documentation pass

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: deskpilot-run-documentation-pass
  cancel-in-progress: false

jobs:
  document:
    if: github.head_ref == 'docs/comment-all-functions'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/comment-all-functions
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Extract and run the canonical annotator
        shell: pwsh
        run: |
          $source = Get-Content .github\workflows\document-all-files.yml
          $start = [Array]::IndexOf($source, "          @'")
          $end = [Array]::IndexOf($source, "          '@ | Set-Content -Encoding utf8NoBOM .\document_repository.py")
          if ($start -lt 0 -or $end -le $start) { throw 'Embedded documentation script was not found.' }
          $script = $source[($start + 1)..($end - 1)] | ForEach-Object {
            if ($_.StartsWith('          ')) { $_.Substring(10) } else { $_ }
          }
          $script | Set-Content -Encoding utf8NoBOM .\document_repository.py
          python .\document_repository.py
          Remove-Item .\document_repository.py -Force
          cargo fmt --all

      - name: Validate documented tree
        shell: pwsh
        run: |
          cargo metadata --locked --no-deps --format-version 1 | Out-Null
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish changes when present
        shell: pwsh
        run: |
          git diff --check
          if (-not (git status --porcelain)) {
            Write-Host 'Documentation pass is already applied.'
            exit 0
          }
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Document every maintained source file and function'
          git push origin HEAD:docs/comment-all-functions
