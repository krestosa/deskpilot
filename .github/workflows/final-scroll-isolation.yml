# File purpose: Temporarily validates that Win-modified scroll is captured even when desktop navigation is suspended.
name: Validate final scroll isolation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/final-reconciliation-fence'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/final-reconciliation-fence
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Apply fullscreen input-isolation policy
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path('src/windows/hooks.rs')
          text = path.read_text(encoding='utf-8')
          old = '''            let active = context.enabled.load(Ordering::Acquire)
                          && context.backend_ready.load(Ordering::Acquire)
                          && !context.suspended.load(Ordering::Acquire);
                      if !active || !win_pressed(context) {
                          reset_wheel(context);
                          return unsafe { CallNextHookEx(0 as HHOOK, code, wparam, lparam) };
                      }

                      context.consumed_win_chord.store(true, Ordering::Release);
                      if message == WM_MOUSEWHEEL {'''.replace('          ', '')
          new = '''            let (capture, navigate) = scroll_policy(
                          context.enabled.load(Ordering::Acquire),
                          context.backend_ready.load(Ordering::Acquire),
                          win_pressed(context),
                          context.suspended.load(Ordering::Acquire),
                      );
                      if !capture {
                          reset_wheel(context);
                          return unsafe { CallNextHookEx(0 as HHOOK, code, wparam, lparam) };
                      }

                      context.consumed_win_chord.store(true, Ordering::Release);
                      if !navigate {
                          reset_wheel(context);
                          return 1;
                      }
                      if message == WM_MOUSEWHEEL {'''.replace('          ', '')
          if text.count(old) != 1:
              raise SystemExit(f'expected one mouse policy block, found {text.count(old)}')
          text = text.replace(old, new, 1)

          marker = '''// Function purpose: Identifies all mouse-wheel messages that must be blocked from the application beneath the pointer during a Win gesture.
          fn is_scroll_message(message: u32) -> bool {'''.replace('          ', '')
          policy = '''// Function purpose: Separates unconditional Win-scroll capture from optional navigation suspension so foreground applications never receive the gesture.
          fn scroll_policy(
              enabled: bool,
              backend_ready: bool,
              win_pressed: bool,
              suspended: bool,
          ) -> (bool, bool) {
              let capture = enabled && backend_ready && win_pressed;
              (capture, capture && !suspended)
          }

          '''.replace('          ', '')
          if text.count(marker) != 1:
              raise SystemExit('scroll-message marker changed')
          text = text.replace(marker, policy + marker, 1)

          text = text.replace(
              '    use super::{is_scroll_message, suppressed_win_release_inputs};',
              '    use super::{is_scroll_message, scroll_policy, suppressed_win_release_inputs};',
              1,
          )
          test_marker = '''    // Function purpose: Verifies that both vertical and horizontal wheel messages are classified as scroll that must be captured.
              #[test]'''.replace('          ', '')
          test = '''    // Function purpose: Verifies fullscreen suspension blocks navigation but still consumes Win-modified scroll before it reaches the foreground application.
              #[test]
              fn fullscreen_suspension_preserves_scroll_capture() {
                  assert_eq!(scroll_policy(true, true, true, true), (true, false));
                  assert_eq!(scroll_policy(true, true, true, false), (true, true));
                  assert_eq!(scroll_policy(true, true, false, false), (false, false));
              }

          '''.replace('          ', '')
          if text.count(test_marker) != 1:
              raise SystemExit('hook test marker changed')
          text = text.replace(test_marker, test + test_marker, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          '@ | Set-Content -Encoding utf8NoBOM patch_scroll.py
          python patch_scroll.py
          Remove-Item patch_scroll.py

      - name: Format and validate
        shell: pwsh
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish validated source change
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src\windows\hooks.rs
          git commit -m "Capture Win scroll while navigation is suspended"
          git push origin HEAD:fix/final-reconciliation-fence
