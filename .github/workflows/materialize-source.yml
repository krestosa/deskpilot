name: Materialize source

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - .github/workflows/materialize-source.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/materialize-source.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-materialize
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
          show-progress: false
      - name: Reconstruct source tree
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations
          import base64
          import io
          import pathlib
          import tarfile

          root = pathlib.Path('.').resolve()
          parts = sorted((root / '.deskpilot-bootstrap').glob('part-*'))
          if not parts:
              raise SystemExit('no transport parts found')
          texts = [''.join(path.read_text(encoding='utf-8').split()) for path in parts]
          candidates: list[tuple[str, bytes]] = []
          try:
              candidates.append(('continuous-base64', base64.b64decode(''.join(texts), validate=True)))
          except Exception as error:
              print(f'continuous-base64 rejected: {error}')
          try:
              candidates.append(('per-part-base64', b''.join(base64.b64decode(text, validate=True) for text in texts)))
          except Exception as error:
              print(f'per-part-base64 rejected: {error}')

          selected: tuple[str, bytes] | None = None
          for mode, payload in candidates:
              try:
                  with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
                      members = archive.getmembers()
                      for member in members:
                          target = (root / member.name).resolve()
                          if root != target and root not in target.parents:
                              raise RuntimeError(f'unsafe archive member: {member.name}')
                      if not any(member.name.endswith('Cargo.toml') for member in members):
                          raise RuntimeError('archive does not contain Cargo.toml')
                  selected = (mode, payload)
                  break
              except Exception as error:
                  print(f'{mode} archive rejected: {error}')
          if selected is None:
              raise SystemExit('no valid source archive candidate')

          mode, payload = selected
          print(f'selected {mode}: {len(payload)} bytes from {len(parts)} parts')
          with tarfile.open(fileobj=io.BytesIO(payload), mode='r:gz') as archive:
              archive.extractall(root, filter='data')
          PY
          rm -rf .deskpilot-bootstrap
          rm -f .github/workflows/materialize-source.yml
      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Materialize DeskPilot source tree"
          git push origin HEAD:feature/portable-dynamic-desktop-manager
