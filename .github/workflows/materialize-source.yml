name: Materialize source

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - .github/workflows/materialize-source.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/materialize-source.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-materialize
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
          show-progress: false
      - name: Reconstruct source tree
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 --decode | python3
          rm -rf .deskpilot-bootstrap
          rm -f .github/workflows/materialize-source.yml
      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Materialize DeskPilot source tree"
          git push origin HEAD:feature/portable-dynamic-desktop-manager
