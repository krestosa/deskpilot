name: Materialize source

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - .github/workflows/materialize-source.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/materialize-source.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-materialize
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
          show-progress: false
      - name: Reconstruct source tree
        id: reconstruct
        shell: bash
        run: |
          set -o pipefail
          python3 .github/materialize.py > /tmp/materialize.log 2>&1
          status=$?
          cat /tmp/materialize.log
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi
          rm -rf .deskpilot-bootstrap
          rm -f .github/materialize.py
          rm -f .github/workflows/bootstrap.yml
          rm -f .github/workflows/materialize-source.yml
      - name: Upload reconstruction diagnostics
        if: always() && steps.reconstruct.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: materialize-diagnostics-${{ github.sha }}
          path: /tmp/materialize.log
          if-no-files-found: error
          retention-days: 3
      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement portable dynamic desktop manager"
          git push origin HEAD:feature/portable-dynamic-desktop-manager
# checksum-gated reconstruction retry
