name: Prepare DeskPilot CI snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deskpilot-prepare-ci
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Require materialized source
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.toml) -or -not (Test-Path src\main.rs)) { throw 'Source is not materialized.' }
          if (Test-Path .deskpilot-bootstrap) { throw 'Temporary transport files remain.' }
      - name: Install Rust and normalize source
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          rustup component add rustfmt
          cargo generate-lockfile
          cargo fmt --all
          .\scripts\verify-license.ps1
          Remove-Item .github\workflows\prepare-ci.yml
      - name: Commit lockfile and formatting
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git diff --cached --check
          if (git diff --cached --quiet) { exit 0 }
          git commit -m 'Lock dependencies and normalize Rust formatting'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
