# File purpose: Temporarily applies and validates the File Explorer trailing-spare occupancy correction.
name: Apply Explorer spare fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/count-file-explorer-spare-occupancy'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/count-file-explorer-spare-occupancy
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Apply source correction
        shell: pwsh
        run: python tools/apply_explorer_spare_fix.py

      - name: Format generated Rust
        shell: pwsh
        run: cargo fmt --all

      - name: Validate source and portable package
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          cargo build --release --locked --target x86_64-pc-windows-msvc
          .\scripts\verify-license.ps1
          .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish validated application changes
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.toml Cargo.lock CHANGELOG.md src tests
          if (git diff --cached --quiet) {
            Write-Host 'No application changes to publish.'
            exit 0
          }
          git commit -m "Count File Explorer as spare occupancy"
          git push origin HEAD:fix/count-file-explorer-spare-occupancy
