name: Normalize Rust source

on:
  push:
    branches:
      - feature/portable-dynamic-desktop-manager
    paths:
      - .github/workflows/normalize-source.yml
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
    paths:
      - .github/workflows/normalize-source.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deskpilot-normalize-source
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/portable-dynamic-desktop-manager
          fetch-depth: 0
      - name: Install formatter
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt
      - name: Normalize, format, and lock dependencies
        shell: pwsh
        run: |
          git config core.autocrlf false
          git add --renormalize .gitattributes Cargo.toml build.rs src tests
          cargo fmt --all
          cargo generate-lockfile
          git add .gitattributes Cargo.toml Cargo.lock build.rs src tests
          git diff --cached --check
      - name: Publish normalized sources
        shell: pwsh
        run: |
          if (git diff --cached --quiet) { throw 'No normalization changes were produced.' }
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Normalize Rust sources and lock dependencies'
          git push origin HEAD:feature/portable-dynamic-desktop-manager
