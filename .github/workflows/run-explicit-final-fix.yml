# File purpose: Temporarily applies, formats, diagnoses, and validates the explicit final reconciliation patch script.
name: Run explicit final reconciliation fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/final-reconciliation-fence'
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/final-reconciliation-fence
          fetch-depth: 0

      - name: Install Rust 1.85
        shell: pwsh
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt --component clippy --target x86_64-pc-windows-msvc
          rustup default 1.85.0

      - name: Apply explicit patch
        shell: pwsh
        run: python tools/apply_final_fix.py

      - name: Format generated Rust
        shell: pwsh
        run: cargo fmt --all

      - name: Check formatting
        shell: pwsh
        run: cargo fmt --all -- --check

      - name: Run Clippy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force diagnostics | Out-Null
          cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 |
            Tee-Object -FilePath diagnostics\clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Capture failed generated tree
        if: failure()
        shell: pwsh
        run: |
          Copy-Item src\app.rs diagnostics\app.rs
          Copy-Item src\wheel.rs diagnostics\wheel.rs
          Copy-Item src\windows\hooks.rs diagnostics\hooks.rs
          Copy-Item src\reconciliation\engine.rs diagnostics\engine.rs
          Copy-Item tests\virtual_reconciliation.rs diagnostics\virtual_reconciliation.rs

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: final-reconciliation-clippy-diagnostics-${{ github.event.pull_request.head.sha }}
          path: diagnostics/**
          if-no-files-found: error

      - name: Run tests
        shell: pwsh
        run: cargo test --workspace --locked

      - name: Build release
        shell: pwsh
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Verify license
        shell: pwsh
        run: .\scripts\verify-license.ps1

      - name: Build portable package
        shell: pwsh
        run: .\scripts\build-portable.ps1 -SkipBuild

      - name: Publish validated changes
        shell: pwsh
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git rm tools/apply_final_fix.py
          git rm .github/workflows/run-explicit-final-fix.yml
          git commit -m "Serialize reconciliation and capture Win scroll"
          git push origin HEAD:fix/final-reconciliation-fence
